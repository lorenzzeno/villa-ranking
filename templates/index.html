<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏖️ Villa Ranking</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --card: #1a1d2e;
  --card-hover: #1f2337;
  --accent: #f5a623;
  --text: #e2e8f0;
  --dim: #718096;
  --border: #2d3748;
  --green: #48bb78;
  --red: #fc8181;
  --gold: #ecc94b;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a1d2e, #2d3a5c);
  padding: 28px 20px 18px;
  text-align: center;
  border-bottom: 2px solid var(--accent);
}
.header h1 { font-size: 26px; font-weight: 800; }
.header p { color: var(--dim); font-size: 13px; margin-top: 4px; }

/* WHO ARE YOU */
.who {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  flex-wrap: wrap;
  background: rgba(0,0,0,.25);
}
.who span { color: var(--dim); font-size: 13px; }
.vbtn {
  background: var(--card);
  border: 2px solid var(--border);
  color: var(--dim);
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: .2s;
  font-weight: 600;
}
.vbtn.on { background: var(--accent); border-color: var(--accent); color: #000; }
.vbtn:hover:not(.on) { border-color: var(--dim); color: var(--text); }

/* ADD BAR */
.add-wrap { max-width: 720px; margin: 16px auto; padding: 0 14px; }
.add-bar {
  display: flex; gap: 8px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 6px;
}
.add-bar:focus-within { border-color: var(--accent); }
.add-bar input {
  flex: 1; background: 0; border: 0; color: var(--text);
  font-size: 15px; padding: 10px 14px; outline: 0;
}
.add-bar input::placeholder { color: var(--dim); }
.add-bar button {
  background: var(--accent); color: #000; border: 0;
  border-radius: 10px; padding: 10px 20px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: .2s;
}
.add-bar button:hover { background: #e8912d; }
.add-bar button:disabled { opacity: .5; cursor: wait; }

/* VILLA CARDS */
.list { max-width: 720px; margin: 16px auto; padding: 0 14px 40px; display: flex; flex-direction: column; gap: 14px; }

.card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
  transition: .2s;
}
.card:hover { border-color: #3d4760; }

.card-top { display: flex; }

.card-img {
  width: 180px; min-height: 140px;
  object-fit: cover; background: var(--border); flex-shrink: 0;
}

.card-body { flex: 1; padding: 14px 14px 10px; min-width: 0; }

.card-rank {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; background: var(--accent); color: #000;
  border-radius: 7px; font-weight: 800; font-size: 13px; margin-right: 6px;
}

.card-title {
  font-size: 16px; font-weight: 700;
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.card-title a { color: var(--text); text-decoration: none; }
.card-title a:hover { color: var(--accent); }

.badge {
  font-size: 10px; padding: 2px 7px; border-radius: 5px;
  font-weight: 600; text-transform: uppercase;
}
.b-airbnb { background: #ff5a5f22; color: #ff5a5f; }
.b-booking { background: #003b9522; color: #4a90d9; }

/* KEY INFO GRID */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 6px;
  margin: 8px 0;
}
.info-item {
  background: rgba(255,255,255,.04);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
}
.info-item .label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
.info-item .value { font-weight: 700; font-size: 14px; margin-top: 2px; }
.info-item .value.yes { color: var(--green); }
.info-item .value.no { color: var(--red); }
.info-item .value.price { color: var(--gold); }

/* SCORE COLUMN */
.card-score {
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 14px 18px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  min-width: 80px;
}
.score-num { font-size: 36px; font-weight: 800; line-height: 1; }
.score-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

/* STARS */
.stars-row {
  display: flex; justify-content: center; align-items: center;
  gap: 2px; padding: 10px 14px;
  background: rgba(0,0,0,.25); border-top: 1px solid var(--border);
}
.star {
  font-size: 30px; cursor: pointer; transition: .12s;
  filter: grayscale(1) opacity(.25); user-select: none; padding: 2px 4px;
}
.star:hover, .star.pre { filter: grayscale(0) opacity(.65); transform: scale(1.15); }
.star.on { filter: grayscale(0) opacity(1); }

.your-pick { font-size: 12px; color: var(--dim); margin-left: 10px; }

.hint {
  text-align: center; padding: 10px; font-size: 12px;
  color: var(--dim); background: rgba(0,0,0,.25);
  border-top: 1px solid var(--border);
}

/* VOTER CHIPS */
.chips {
  display: flex; justify-content: center; gap: 10px;
  padding: 6px 14px 10px; flex-wrap: wrap;
  background: rgba(0,0,0,.15);
}
.chip { font-size: 11px; color: var(--dim); }
.chip b { color: var(--accent); }

/* DELETE */
.del {
  position: absolute; top: 8px; right: 8px;
  background: rgba(252,129,129,.15); border: 0; color: var(--red);
  width: 26px; height: 26px; border-radius: 7px;
  cursor: pointer; font-size: 13px; opacity: 0; transition: .2s;
}
.card:hover .del { opacity: 1; }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--dim); }
.empty .e { font-size: 48px; margin-bottom: 12px; }
.empty h3 { color: var(--text); margin-bottom: 6px; }

/* LOADER */
.ld {
  display: inline-block; width: 18px; height: 18px;
  border: 3px solid rgba(0,0,0,.2); border-top-color: #000;
  border-radius: 50%; animation: sp .7s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }

/* COLORS */
.c5 { color: #48bb78; } .c4 { color: #68d391; }
.c3 { color: #ecc94b; } .c2 { color: #f6ad55; } .c1 { color: #fc8181; }

@media (max-width: 600px) {
  .card-top { flex-direction: column; }
  .card-img { width: 100%; height: 180px; }
  .card-score { border-left: 0; border-top: 1px solid var(--border); flex-direction: row; gap: 8px; padding: 10px; }
  .info-grid { grid-template-columns: repeat(3, 1fr); }
  .star { font-size: 34px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🏖️ Villa Ranking</h1>
  <p>Link rein → Details automatisch → Sterne klicken → Ranking</p>
</div>

<div class="who">
  <span>Ich bin:</span>
  <button class="vbtn" onclick="pick(this)" data-v="Lorenz">Lorenz</button>
  <button class="vbtn" onclick="pick(this)" data-v="Jan">Jan</button>
  <button class="vbtn" onclick="pick(this)" data-v="Levent">Levent</button>
  <button class="vbtn" onclick="pick(this)" data-v="Grappe">Grappe</button>
  <button class="vbtn" onclick="pick(this)" data-v="Nicola">Nicola</button>
  <button class="vbtn" onclick="pick(this)" data-v="Rapha">Rapha</button>
  <button class="vbtn" onclick="pick(this)" data-v="Flo">Flo</button>
  <button class="vbtn" onclick="pick(this)" data-v="Ferdi">Ferdi</button>
</div>

<div class="add-wrap">
  <div class="add-bar">
    <input id="inp" placeholder="Airbnb / Booking.com Link pasten..." onkeydown="if(event.key==='Enter')add()">
    <button id="btn" onclick="add()">+ Villa</button>
  </div>
</div>

<div class="list" id="L"></div>

<script>
const V=["Lorenz","Jan","Levent","Grappe","Nicola","Rapha","Flo","Ferdi"];
let me=localStorage.getItem('vv')||'';
let D=[];

if(me)document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===me));

function pick(el){me=el.dataset.v;localStorage.setItem('vv',me);document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===me));render();}

function sc(s){return s>=4.5?'c5':s>=3.5?'c4':s>=2.5?'c3':s>=1.5?'c2':'c1';}

function render(){
  const c=document.getElementById('L');
  if(!D.length){c.innerHTML='<div class="empty"><div class="e">🏡</div><h3>Noch keine Villen</h3><p>Paste den ersten Link!</p></div>';return;}

  c.innerHTML=D.map((v,i)=>{
    const n=v.info||{};
    const mv=v.votes[me]||0;
    const src=n.source==='airbnb'?'<span class="badge b-airbnb">Airbnb</span>':n.source==='booking'?'<span class="badge b-booking">Booking</span>':'';

    // Info items
    let infos='';
    if(n.checkin&&n.checkout) infos+=`<div class="info-item"><div class="label">Datum</div><div class="value">${n.checkin} → ${n.checkout}</div></div>`;
    if(n.guests) infos+=`<div class="info-item"><div class="label">Personen</div><div class="value">👥 ${n.guests}</div></div>`;
    if(n.price) infos+=`<div class="info-item"><div class="label">Kosten</div><div class="value price">💰 ${n.price}</div></div>`;

    const checks=[
      ['Pool','🏊'],['Fitness','💪'],['Sauna','🧖'],['Strand','🏖️'],['Küche','🍳'],['WLAN','📶'],['Klimaanlage','❄️'],['Jacuzzi','🫧'],['Meerblick','🌊']
    ];
    const am=n.amenities||[];
    checks.forEach(([k,e])=>{
      const has=am.includes(k);
      infos+=`<div class="info-item"><div class="label">${e} ${k}</div><div class="value ${has?'yes':'no'}">${has?'✓':'✗'}</div></div>`;
    });

    if(n.airport_distance) infos+=`<div class="info-item"><div class="label">✈️ Flughafen</div><div class="value">${n.airport_distance}</div></div>`;

    // Stars
    const stars=[1,2,3,4,5].map(s=>
      `<span class="star ${s<=mv?'on':''}" onclick="vote('${v.id}',${s})" onmouseenter="pre(this,${s})" onmouseleave="clr(this)">⭐</span>`
    ).join('');

    // Voter chips
    const chips=V.filter(x=>v.votes[x]).map(x=>`<span class="chip">${x}: <b>${v.votes[x]}⭐</b></span>`).join('');

    const loc=n.location?`<span style="color:var(--dim);font-size:12px">📍 ${n.location}</span>`:'';

    return `
    <div class="card">
      <button class="del" onclick="del('${v.id}')" title="Löschen">✕</button>
      <div class="card-top">
        ${n.image?`<img class="card-img" src="${n.image}" onerror="this.style.display='none'">`:''}
        <div class="card-body">
          <div class="card-title">
            <span class="card-rank">${i+1}</span>
            <a href="${v.url}" target="_blank">${n.name||'Villa'}</a>
            ${src}
          </div>
          ${loc}
          <div class="info-grid">${infos}</div>
        </div>
        <div class="card-score">
          <div class="score-num ${sc(v.avg_score)}">${v.avg_score>0?v.avg_score:'—'}</div>
          <div class="score-sub">${v.vote_count} Vote${v.vote_count!==1?'s':''}</div>
        </div>
      </div>
      ${me?`<div class="stars-row">${stars}<span class="your-pick">${mv?mv+'/5':'Noch nicht bewertet'}</span></div>`
           :`<div class="hint">👆 Wähle oben deinen Namen um abzustimmen</div>`}
      ${chips?`<div class="chips">${chips}</div>`:''}
    </div>`;
  }).join('');
}

function pre(el,s){el.parentElement.querySelectorAll('.star').forEach((x,i)=>x.classList.toggle('pre',i<s));}
function clr(el){el.parentElement.querySelectorAll('.star').forEach(x=>x.classList.remove('pre'));}

async function load(){
  const r=await fetch('/api/villas');
  const d=await r.json();
  D=d.villas;
  render();
}

async function vote(id,s){
  if(!me){alert('Wähle zuerst deinen Namen!');return;}
  await fetch('/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({villa_id:id,voter:me,score:s})});
  load();
}

async function add(){
  const inp=document.getElementById('inp'),btn=document.getElementById('btn');
  const url=inp.value.trim();
  if(!url)return;
  if(!url.includes('airbnb')&&!url.includes('booking')){alert('Bitte Airbnb oder Booking Link');return;}
  btn.disabled=true;btn.innerHTML='<span class="ld"></span>';
  try{
    const r=await fetch('/api/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,added_by:me||'Anonym'})});
    if(r.ok){inp.value='';load();}else{const e=await r.json();alert(e.error);}
  }catch(e){alert('Fehler');}
  btn.disabled=false;btn.innerHTML='+ Villa';
}

async function del(id){
  if(!confirm('Villa entfernen?'))return;
  await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({villa_id:id})});
  load();
}

load();
setInterval(load,20000);
</script>
</body>
</html>
